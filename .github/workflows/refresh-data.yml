name: Refresh data

# The app ships a committed snapshot of the bracket, so it renders instantly with no
# requests — but that snapshot goes stale the moment a game finishes. This keeps it
# current DURING the tournament: the cron only fires in March and April (First Four
# through the National Championship). Off-season, run it by hand via workflow_dispatch.
#
# Twice daily: early morning UTC (after every game has finished) and mid-afternoon UTC
# (catches afternoon tips and the day's early results).

on:
  schedule:
    - cron: '15 9 * 3,4 *'
    - cron: '15 19 * 3,4 *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # No npm ci — the fetch script uses Node built-ins only, which keeps this job
      # fast and immune to a broken lockfile.
      - name: Regenerate bracket, teams, and logos
        run: node scripts/fetch-bracket.mjs --season 2026

      - name: Summarize what changed
        id: diff
        run: |
          if git diff --quiet -- src/data public/logos; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Data refresh"
              echo '```'
              git diff --stat -- src/data public/logos
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # Tests run against the committed data, so a refresh that breaks them must not
      # merge. This is the whole reason the refresh goes through a PR rather than
      # pushing straight to main.
      - name: Install and test against the refreshed data
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm ci
          npm test

      - name: Open a pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: data/refresh
          base: main
          title: 'Refresh bracket data'
          commit-message: 'Refresh bracket, results, and teams from ESPN'
          body: |
            Automated refresh of the committed bracket snapshot.

            Regenerated by `scripts/fetch-bracket.mjs`. The test suite ran against
            the new data before this PR was opened — the bracket is derived from the
            committed games, so a bad refresh shows up as a failing test rather than
            a wrong-looking bracket.
          delete-branch: true
